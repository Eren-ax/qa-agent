version: 1
disable_existing_loggers: false
formatters:
    json:
        "()": app.logging.DatadogJsonFormatter
        format: "%(asctime)s %(levelname)s %(name)s %(message)s"
        rename_fields:
            levelname: level
        static_fields:
            project: python-boilerplate
handlers:
    console:
        class: logging.StreamHandler
        formatter: json
        stream: ext://sys.stdout
loggers:
    app:
        handlers: [console]
        level: INFO
        propagate: false
    fastapi:
        handlers: [console]
        level: WARNING
        propagate: false
    uvicorn:
        handlers: [console]
        level: WARNING
        propagate: false
    uvicorn.error:
        handlers: [console]
        level: WARNING
        propagate: false
    uvicorn.access:
        handlers: [console]
        level: WARNING
        propagate: false
    pydantic:
        handlers: [console]
        level: WARNING
        propagate: false
    pydantic_settings:
        handlers: [console]
        level: WARNING
        propagate: false
    httpx:
        handlers: [console]
        level: WARNING
        propagate: false
    ddtrace:
        handlers: [console]
        level: WARNING
        propagate: false
root:
    handlers: [console]
    level: INFO
